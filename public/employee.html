<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HelpDesk Lite - Employee Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="dashboard-container">
    <header class="dashboard-header">
      <h1>Employee Dashboard</h1>
      <div class="user-info">
        <span id="username"></span>
        <button id="logoutBtn" class="btn btn-secondary">Logout</button>
      </div>
    </header>
    
    <div class="dashboard-content">
      <div class="card">
        <h2>Create New Ticket</h2>
        <form id="createTicketForm">
          <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" required placeholder="Enter ticket title">
          </div>
          
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category" required>
              <option value="">Select category</option>
              <option value="IT">IT</option>
              <option value="HR">HR</option>
              <option value="Facilities">Facilities</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="priority">Priority</label>
            <select id="priority" name="priority" required>
              <option value="">Select priority</option>
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4" required placeholder="Describe your issue"></textarea>
          </div>
          
          <button type="submit" class="btn btn-primary">Submit Ticket</button>
        </form>
      </div>
      
      <div class="card">
        <h2>My Tickets</h2>
        <div id="ticketsList" class="tickets-list">
          <p>Loading tickets...</p>
        </div>
      </div>
    </div>
  </div>
  
  <div id="error" class="error-message"></div>
  <div id="success" class="success-message"></div>
  
  <script src="js/employee.js"></script>
</body>
</html>
